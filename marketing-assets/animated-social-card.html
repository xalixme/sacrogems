<style>
        /* Custom Animations */
        @keyframes stickerPop {
            0% { transform: scale(0.8) rotate(-5deg); opacity: 0; }
            50% { transform: scale(1.05) rotate(2deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        @keyframes floatLogo {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        
        @keyframes sparkleTwinkle {
            0% { transform: scale(0.8) rotate(0deg); opacity: 0.5; }
            50% { transform: scale(1.2) rotate(15deg); opacity: 1; }
            100% { transform: scale(0.8) rotate(0deg); opacity: 0.5; }
        }
        
        @keyframes drift {
            0% { transform: translateY(0px) translateX(0px); }
            33% { transform: translateY(-15px) translateX(10px); }
            66% { transform: translateY(5px) translateX(-15px); }
            100% { transform: translateY(0px) translateX(0px); }
        }

        .animate-sticker-pop {
            animation: stickerPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        .animate-float-logo {
            animation: floatLogo 4s ease-in-out infinite;
        }
        
        .sparkle-container {
            position: absolute;
            pointer-events: none;
        }
        
        .sparkle {
            animation: sparkleTwinkle 2s ease-in-out infinite, drift 6s ease-in-out infinite;
        }
        
        .sparkle-delay-1 { animation-delay: 0.5s; }
        .sparkle-delay-2 { animation-delay: 1.2s; }
        .sparkle-delay-3 { animation-delay: 1.8s; }

<!-- JavaScript for interactive effects -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.animate-sticker-pop');
            
            // Add slight 3D tilt effect on mousemove for extra interactivity
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left; // x position within the element.
                const y = e.clientY - rect.top;  // y position within the element.
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = ((y - centerY) / centerY) * -5; // Max 5 deg tilt
                const rotateY = ((x - centerX) / centerX) * 5;
                
                // Only apply if animation has finished (roughly after 1s)
                if(card.style.animationName !== 'stickerPop') {
                     card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                     card.style.transition = 'transform 0.1s ease-out';
                }
            });

            card.addEventListener('mouseleave', () => {
                 card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
                 card.style.transition = 'transform 0.5s ease-in-out';
            });
            
            // Remove the entrance animation class after it completes to allow hover effects
            setTimeout(() => {
                card.classList.remove('animate-sticker-pop');
                // Set the final state manually to prevent snapping back
                card.style.opacity = '1';
                card.style.transform = 'scale(1) rotate(0deg)';
            }, 1000);
        });
    </script>
